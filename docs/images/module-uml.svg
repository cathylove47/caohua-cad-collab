<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="980" viewBox="0 0 1400 980">
  <defs>
    <style>
      .title { font: 700 34px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #18212f; }
      .group { font: 700 24px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #37516b; }
      .box-title { font: 700 21px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #142033; }
      .box-text { font: 400 17px "SF Mono", "Menlo", monospace; fill: #344055; }
      .label { font: 600 18px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #4d6480; }
      .card { fill: #ffffff; stroke: #6f8aa6; stroke-width: 2; rx: 18; ry: 18; }
      .header { fill: #e9f1f8; stroke: #6f8aa6; stroke-width: 2; }
      .arrow { stroke: #4f6d8a; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .bg { fill: #f5f8fb; }
      .panel { fill: #eef4fa; stroke: #c5d3e0; stroke-width: 2; rx: 24; ry: 24; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4f6d8a"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1400" height="980"/>
  <text class="title" x="60" y="64">协同 CAD 系统模块 UML 图</text>
  <text class="label" x="60" y="100">面向课程设计答辩的 MVP 组件关系</text>

  <rect class="panel" x="44" y="132" width="736" height="790"/>
  <text class="group" x="70" y="176">Frontend</text>

  <rect class="panel" x="818" y="132" width="538" height="790"/>
  <text class="group" x="844" y="176">Backend</text>

  <g transform="translate(80,210)">
    <rect class="card" x="0" y="0" width="260" height="168"/>
    <rect class="header" x="0" y="0" width="260" height="44"/>
    <text class="box-title" x="16" y="29">Toolbar</text>
    <text class="box-text" x="16" y="74">+ addPrimitive()</text>
    <text class="box-text" x="16" y="102">+ runSmartCommand()</text>
    <text class="box-text" x="16" y="130">+ saveProject()</text>
  </g>

  <g transform="translate(400,210)">
    <rect class="card" x="0" y="0" width="300" height="220"/>
    <rect class="header" x="0" y="0" width="300" height="44"/>
    <text class="box-title" x="16" y="29">CadStore</text>
    <text class="box-text" x="16" y="72">+ connectSession()</text>
    <text class="box-text" x="16" y="98">+ addObject()</text>
    <text class="box-text" x="16" y="124">+ extrudeSelected()</text>
    <text class="box-text" x="16" y="150">+ cutSelected()</text>
    <text class="box-text" x="16" y="176">+ undo() / redo()</text>
    <text class="box-text" x="16" y="202">+ loadProject()</text>
  </g>

  <g transform="translate(80,460)">
    <rect class="card" x="0" y="0" width="260" height="156"/>
    <rect class="header" x="0" y="0" width="260" height="44"/>
    <text class="box-title" x="16" y="29">FeatureTree</text>
    <text class="box-text" x="16" y="74">+ selectObject()</text>
    <text class="box-text" x="16" y="102">+ showHistory()</text>
    <text class="box-text" x="16" y="130">+ showVersions()</text>
  </g>

  <g transform="translate(400,480)">
    <rect class="card" x="0" y="0" width="300" height="180"/>
    <rect class="header" x="0" y="0" width="300" height="44"/>
    <text class="box-title" x="16" y="29">CanvasViewport</text>
    <text class="box-text" x="16" y="74">+ renderScene()</text>
    <text class="box-text" x="16" y="102">+ pickObject()</text>
    <text class="box-text" x="16" y="130">+ sendCursor()</text>
    <text class="box-text" x="16" y="158">+ showRemotePointers()</text>
  </g>

  <g transform="translate(236,700)">
    <rect class="card" x="0" y="0" width="308" height="170"/>
    <rect class="header" x="0" y="0" width="308" height="44"/>
    <text class="box-title" x="16" y="29">InspectorPanel</text>
    <text class="box-text" x="16" y="74">+ editParams()</text>
    <text class="box-text" x="16" y="102">+ restoreVersion()</text>
    <text class="box-text" x="16" y="130">+ conflictNotice()</text>
  </g>

  <g transform="translate(856,222)">
    <rect class="card" x="0" y="0" width="240" height="170"/>
    <rect class="header" x="0" y="0" width="240" height="44"/>
    <text class="box-title" x="16" y="29">Server</text>
    <text class="box-text" x="16" y="74">+ GET state</text>
    <text class="box-text" x="16" y="102">+ POST save</text>
    <text class="box-text" x="16" y="130">+ POST restore</text>
  </g>

  <g transform="translate(1120,222)">
    <rect class="card" x="0" y="0" width="196" height="170"/>
    <rect class="header" x="0" y="0" width="196" height="44"/>
    <text class="box-title" x="16" y="29">RoomManager</text>
    <text class="box-text" x="16" y="74">+ applyOperation()</text>
    <text class="box-text" x="16" y="102">+ upsertUser()</text>
    <text class="box-text" x="16" y="130">+ upsertCursor()</text>
  </g>

  <g transform="translate(988,520)">
    <rect class="card" x="0" y="0" width="248" height="188"/>
    <rect class="header" x="0" y="0" width="248" height="44"/>
    <text class="box-title" x="16" y="29">Storage</text>
    <text class="box-text" x="16" y="74">+ loadRoomState()</text>
    <text class="box-text" x="16" y="102">+ saveRoomState()</text>
    <text class="box-text" x="16" y="130">+ listVersions()</text>
    <text class="box-text" x="16" y="158">+ restoreVersion()</text>
  </g>

  <path class="arrow" d="M 340 294 L 400 294"/>
  <path class="arrow" d="M 340 538 L 400 580"/>
  <path class="arrow" d="M 544 700 L 550 660"/>
  <path class="arrow" d="M 700 318 C 790 318, 810 318, 856 318"/>
  <path class="arrow" d="M 1096 308 L 1120 308"/>
  <path class="arrow" d="M 1218 392 L 1112 520"/>
  <path class="arrow" d="M 976 614 C 868 614, 820 614, 700 614"/>

  <text class="label" x="744" y="300">HTTP / WebSocket</text>
  <text class="label" x="1126" y="484">state persistence</text>
  <text class="label" x="776" y="610">versions / snapshots</text>
</svg>
